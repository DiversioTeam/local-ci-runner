<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="960" viewBox="0 0 1400 960" role="img" aria-labelledby="title desc">
  <title id="title">local-ci overview</title>
  <desc id="desc">The repo decides what runs. You decide where to run it. local-ci runs the repo's exact plan on your machine. You inspect the run. GitHub gets a status only for the verified snapshot.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111827"/>
    </marker>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #475569; }
      .box-title { font: 700 23px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #111827; }
      .box-text { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #374151; }
      .note { font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #2563eb; }
      .icon-stroke { stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1400" height="960" fill="#ffffff"/>

  <text x="84" y="64" class="title">The repo decides what runs. You decide where to run it.</text>
  <text x="84" y="100" class="subtitle">local-ci runs the repo's actual plan on your machine and only posts the result that was really verified.</text>

  <!-- You -->
  <rect x="84" y="160" width="280" height="160" rx="26" fill="#dbeafe" stroke="#111827" stroke-width="3"/>
  <circle cx="122" cy="206" r="14" fill="#60a5fa"/>
  <rect x="108" y="228" width="28" height="38" rx="10" fill="#60a5fa"/>
  <text x="160" y="210" class="box-title">You</text>
  <text x="160" y="250" class="box-text">your machine</text>
  <text x="160" y="280" class="box-text">your checkout</text>
  <text x="160" y="310" class="box-text">inspect locally</text>

  <!-- Repo -->
  <rect x="736" y="160" width="280" height="160" rx="26" fill="#ffedd5" stroke="#111827" stroke-width="3"/>
  <path d="M772 229h26c4 0 7 3 7 7v22c0 4-3 7-7 7h-42c-4 0-7-3-7-7v-36c0-4 3-7 7-7h14l6 7h22c4 0 7 3 7 7v3" fill="#f59e0b" class="icon-stroke"/>
  <text x="820" y="210" class="box-title">Repo</text>
  <text x="820" y="250" class="box-text">planner</text>
  <text x="820" y="280" class="box-text">checks</text>
  <text x="820" y="310" class="box-text">verification logic</text>

  <!-- local-ci -->
  <rect x="390" y="392" width="320" height="180" rx="28" fill="#dcfce7" stroke="#111827" stroke-width="3"/>
  <rect x="420" y="434" width="42" height="30" rx="8" fill="#d1fae5" stroke="#15803d" stroke-width="2"/>
  <text x="431" y="456" class="box-text" fill="#15803d">&gt;_</text>
  <text x="498" y="456" class="box-title">local-ci</text>
  <text x="424" y="500" class="box-text">runs the repo's exact plan</text>
  <text x="424" y="530" class="box-text">on your machine</text>
  <text x="446" y="558" class="note">no local-only shortcut</text>

  <!-- Inspect -->
  <rect x="96" y="666" width="360" height="190" rx="28" fill="#fef3c7" stroke="#111827" stroke-width="3"/>
  <rect x="128" y="716" width="24" height="28" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <rect x="136" y="708" width="24" height="28" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="186" y="734" class="box-title">Inspect the run</text>
  <text x="186" y="776" class="box-text">logs</text>
  <text x="186" y="806" class="box-text">artifacts</text>
  <text x="186" y="836" class="box-text">events</text>
  <text x="186" y="866" class="box-text">snapshot data</text>

  <!-- GitHub status -->
  <rect x="644" y="666" width="370" height="190" rx="28" fill="#e9d5ff" stroke="#111827" stroke-width="3"/>
  <circle cx="682" cy="726" r="14" fill="#22c55e"/>
  <path d="M675 726l5 5 10-12" fill="none" stroke="#ffffff" stroke-width="3.5" class="icon-stroke"/>
  <text x="738" y="734" class="box-title">GitHub status</text>
  <text x="676" y="776" class="box-text">publish only for</text>
  <text x="676" y="806" class="box-text">the verified snapshot</text>
  <text x="676" y="846" class="note">repo + SHA + config + plan + tree match</text>

  <!-- Arrows -->
  <line x1="304" y1="320" x2="474" y2="392" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="796" y1="320" x2="626" y2="392" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="470" y1="572" x2="330" y2="666" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="630" y1="572" x2="770" y2="666" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
